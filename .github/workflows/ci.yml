name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test-inference:
    name: Lint & Test — Inference Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Install inference-service dependencies
        run: pip install -e "services/inference-service[dev]"

      - name: Run pytest with coverage
        run: pytest services/inference-service/tests --cov=inference_service --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-inference-service
          path: coverage.xml
          retention-days: 7

  lint-and-test-api:
    name: Lint & Test — API Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Install api-service dependencies
        run: pip install -e "services/api-service[dev]"

      - name: Run pytest with coverage
        run: pytest services/api-service/tests --cov=api_service --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api-service
          path: coverage.xml
          retention-days: 7

  typecheck-frontend:
    name: Typecheck & Lint — Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Run TypeScript type-check
        run: cd frontend && npm run type-check

      - name: Run ESLint
        run: cd frontend && npm run lint

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - lint-and-test-inference
      - lint-and-test-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build inference-service image
        uses: docker/build-push-action@v5
        with:
          context: services/inference-service
          push: false
          tags: factorymind/inference-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/inference-service.tar

      - name: Build api-service image
        uses: docker/build-push-action@v5
        with:
          context: services/api-service
          push: false
          tags: factorymind/api-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/api-service.tar

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: factorymind/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/frontend.tar

      - name: Upload Docker image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ github.sha }}
          path: |
            /tmp/inference-service.tar
            /tmp/api-service.tar
            /tmp/frontend.tar
          retention-days: 1
