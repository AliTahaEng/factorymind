version: "3.9"

networks:
  factorymind:
    external: true

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    networks:
      - factorymind
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - factorymind
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka-test:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "29093:29093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29093,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-test:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-test:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - factorymind
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29093 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  api-service-test:
    build:
      context: ../services/api-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://test:test@postgres-test:5432/test"
      REDIS_URL: "redis://redis-test:6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka-test:29093"
      JWT_SECRET_KEY: "test-secret"
      ENVIRONMENT: "test"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      kafka-test:
        condition: service_healthy
    networks:
      - factorymind
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  inference-service-test:
    build:
      context: ../services/inference-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      ENABLE_TRITON: "false"
      ENABLE_KAFKA_CONSUMER: "false"
      KAFKA_BOOTSTRAP_SERVERS: "kafka-test:29093"
      ENVIRONMENT: "test"
    depends_on:
      kafka-test:
        condition: service_healthy
    networks:
      - factorymind
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
