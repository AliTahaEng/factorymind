apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-factorymind-internal
  namespace: factorymind
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: factorymind
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: factorymind
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: factorymind
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 9092
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 443
          protocol: TCP
