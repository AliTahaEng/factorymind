version: 2

models:
  - name: mart_daily_defect_rates
    description: "Daily defect rates aggregated by camera and product category"
    columns:
      - name: inspection_date
        tests:
          - not_null
      - name: total_inspections
        tests:
          - not_null
      - name: defect_rate_pct
        description: "Defect rate as a percentage (0-100)"

  - name: mart_model_performance
    description: "Daily model performance metrics"
    columns:
      - name: inspection_date
        tests:
          - not_null
      - name: model_version
        tests:
          - not_null
