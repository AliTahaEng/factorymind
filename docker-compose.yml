networks:
  factorymind:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  mlflow_data:
  localstack_data:
  grafana_data:
  loki_data:
  tempo_data:
  triton_models:
  mvtec_data:

services:
  # ─────────────────────────────────────────
  # PostgreSQL + pgvector  (host: 5435)
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: factorymind
      POSTGRES_USER: factorymind
      POSTGRES_PASSWORD: secret
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factorymind"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - factorymind

  # ─────────────────────────────────────────
  # Redis  (host: 6381)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - factorymind

  # ─────────────────────────────────────────
  # Kafka KRaft  (host: 9092 external, 29092 for host clients)
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 0"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - factorymind

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    networks:
      - factorymind

  # ─────────────────────────────────────────
  # LocalStack (S3)  (host: 4566)
  # ─────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.8.1
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infrastructure/localstack/init-buckets.sh:/etc/localstack/init/ready.d/init-buckets.sh
    networks:
      - factorymind

  # ─────────────────────────────────────────
  # MLflow  (host: 5000)
  # ─────────────────────────────────────────
  mlflow-server:
    build:
      context: services/mlflow-server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    command: >
      mlflow server
      --backend-store-uri postgresql://factorymind:secret@postgres:5432/mlflow
      --default-artifact-root s3://factorymind-models-dev/mlflow
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    networks:
      - factorymind

  # ─────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────
  inference-service:
    build:
      context: services/inference-service
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TRITON_SERVER_URL: triton-server:8001
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      POSTGRES_URL: postgresql://factorymind:secret@postgres:5432/factorymind
      S3_ENDPOINT_URL: http://localstack:4566
    ports:
      - "8002:8001"
    networks:
      - factorymind

  api-service:
    build:
      context: services/api-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql://factorymind:secret@postgres:5432/factorymind
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
      S3_ENDPOINT_URL: http://localstack:4566
    ports:
      - "8000:8000"
    networks:
      - factorymind

  camera-simulator:
    build:
      context: services/camera-simulator
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MVTEC_DATA_PATH: /data/mvtec
      IMAGES_PER_SECOND: "2.0"
    volumes:
      - mvtec_data:/data/mvtec
    networks:
      - factorymind
    profiles:
      - simulation

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3002:3000"
    networks:
      - factorymind

  # ─────────────────────────────────────────
  # Monitoring Stack
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - factorymind

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3003:3000"
    networks:
      - factorymind

  loki:
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - factorymind

  tempo:
    image: grafana/tempo:2.6.0
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    networks:
      - factorymind
