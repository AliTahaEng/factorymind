global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: factorymind-dev
    environment: development

rule_files:
  - "rules/inference_alerts.yml"
  - "rules/system_alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "inference-service"
    static_configs:
      - targets: ["inference-service:8001"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "api-service"
    static_configs:
      - targets: ["api-service:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
