global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: inference-service
    static_configs:
      - targets: ["inference-service:8001"]
    metrics_path: /metrics

  - job_name: api-service
    static_configs:
      - targets: ["api-service:8000"]
    metrics_path: /metrics

  - job_name: triton
    static_configs:
      - targets: ["triton-server:8102"]
    metrics_path: /metrics
